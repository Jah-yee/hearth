name: DCO

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

permissions:
  contents: read

jobs:
  dco-check:
    name: Check DCO sign-off
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify every commit is signed off
        env:
          BASE: ${{ github.event.pull_request.base.sha }}
          HEAD: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail
          fail=0
          for sha in $(git rev-list "$BASE".."$HEAD"); do
            # skip merge commits (more than one parent)
            if [ "$(git show -s --format='%P' "$sha" | wc -w)" -gt 1 ]; then
              continue
            fi
            email=$(git show -s --format='%ae' "$sha")
            subject=$(git show -s --format='%s' "$sha")
            # require a Signed-off-by trailer whose email matches the commit author (BRE: '+' is literal)
            if git show -s --format='%B' "$sha" | grep -qi -- "^Signed-off-by:.*<${email}>"; then
              echo "ok       $sha  $subject"
            else
              echo "MISSING  $sha  $subject  (author <$email>)"
              fail=1
            fi
          done
          if [ "$fail" -ne 0 ]; then
            echo ""
            echo "::error::One or more commits are missing a matching 'Signed-off-by' line."
            echo "Sign off your commits and push again:"
            echo "  git commit -s                       # for new commits"
            echo "  git rebase --signoff origin/main    # to sign off an existing branch"
            echo "See https://developercertificate.org/"
            exit 1
          fi
          echo "All commits are signed off."
